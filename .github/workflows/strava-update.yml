name: Update Strava Activity

on:
  schedule:
    # Runs every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-strava:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch latest Strava activity
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          # Exchange refresh token for access token
          TOKEN_RESPONSE=$(curl -s -X POST https://www.strava.com/oauth/token \
            -d client_id="$STRAVA_CLIENT_ID" \
            -d client_secret="$STRAVA_CLIENT_SECRET" \
            -d refresh_token="$STRAVA_REFRESH_TOKEN" \
            -d grant_type=refresh_token)

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')

          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to get access token"
            echo "$TOKEN_RESPONSE"
            exit 1
          fi

          # Update the stored refresh token if Strava rotated it
          NEW_REFRESH_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.refresh_token')
          if [ "$NEW_REFRESH_TOKEN" != "null" ] && [ -n "$NEW_REFRESH_TOKEN" ] && [ "$NEW_REFRESH_TOKEN" != "$STRAVA_REFRESH_TOKEN" ]; then
            echo "::warning::Strava rotated your refresh token. Update the STRAVA_REFRESH_TOKEN secret with: $NEW_REFRESH_TOKEN"
          fi

          # Fetch recent activities (grab 10 to find one over 7 minutes)
          ACTIVITIES=$(curl -s "https://www.strava.com/api/v3/athlete/activities?per_page=10" \
            -H "Authorization: Bearer $ACCESS_TOKEN")

          # Filter to first activity with moving_time > 420 seconds (7 minutes)
          # Extract just the fields we need (keep the JSON small and avoid leaking data)
          echo "$ACTIVITIES" | jq '[.[] | select(.moving_time > 420)][0] | {
            name,
            type,
            sport_type,
            distance,
            moving_time,
            total_elevation_gain,
            start_date_local,
            id,
            average_speed,
            max_speed,
            average_heartrate,
            max_heartrate,
            kudos_count,
            elapsed_time
          }' > strava-data.json

          echo "Updated strava-data.json:"
          cat strava-data.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add strava-data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update latest Strava activity [skip ci]"
            git push
          fi
